services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /opt/anton415-hub/app.env
      - /opt/anton415-hub/postgres.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    image: migrate/migrate:v4.18.3
    restart: "no"
    volumes:
      - /opt/anton415-hub/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: cr.yandex/${YC_REGISTRY_ID}/anton415-hub:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - /opt/anton415-hub/app.env
      - /opt/anton415-hub/secrets.env
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
