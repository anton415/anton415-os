name: Deploy Production

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref, branch, tag, or SHA to deploy
        required: true
        default: main
      image_tag:
        description: Optional image tag. Defaults to the short commit SHA.
        required: false
        default: ""

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://todo.anton415.ru
    concurrency:
      group: production
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      IMAGE_NAME: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/anton415-os
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="${{ inputs.image_tag }}"
          fi
          if [ -z "$version" ]; then
            version="$short_sha"
          fi
          {
            echo "tag=$version"
            echo "short_sha=$short_sha"
            echo "image=${IMAGE_NAME}:${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Yandex Container Registry
        env:
          YC_SA_JSON_KEY: ${{ secrets.YC_SA_JSON_KEY }}
        run: |
          printf '%s' "$YC_SA_JSON_KEY" | docker login --username json_key --password-stdin cr.yandex

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ env.IMAGE_NAME }}:main
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.tag }}

      - name: Deploy on production VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/anton415-os
            image="${{ steps.image.outputs.image }}"
            sudo ./sync-lockbox-env.sh
            sudo sed -i.bak -E "s#image: cr.yandex/.*/anton415-os:.*#image: ${image}#g" docker-compose.yml
            sudo docker pull "$image"
            container_id="$(sudo docker create "$image")"
            trap 'sudo docker rm "$container_id" >/dev/null 2>&1 || true' EXIT
            sudo rm -rf migrations
            sudo docker cp "$container_id:/app/migrations" migrations
            sudo docker rm "$container_id"
            trap - EXIT
            sudo docker compose up -d postgres
            sudo docker compose run --rm migrate
            sudo docker compose up -d --force-recreate app caddy
            sudo docker compose exec -T app wget -qO- http://127.0.0.1:8080/health
            sudo docker image prune -f
